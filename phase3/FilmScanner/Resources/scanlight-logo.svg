<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Scanlight">
  <title>Scanlight</title>
  <desc>Additive RGB mark: three overlapping red, green and blue circles on a dark rounded tile, white where all three overlap.</desc>
  <rect width="160" height="160" rx="36" fill="#13151B"/>
  <circle cx="80" cy="60" r="36" fill="#FF3B3F" style="mix-blend-mode:lighten"/>
  <circle cx="60" cy="95" r="36" fill="#2CFF78" style="mix-blend-mode:lighten"/>
  <circle cx="100" cy="95" r="36" fill="#368AFF" style="mix-blend-mode:lighten"/>
</svg>
